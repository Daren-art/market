{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<main>
    <div class="form-box">
        <h2>📝 Регистрация</h2>
        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}
        <form action="/register" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" placeholder="Введите имя" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Минимум 6 символов" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
        </form>
        <div class="form-link">Уже есть аккаунт? <a href="/login">Войти</a></div>
    </div>
</main>
{% endblock %}
