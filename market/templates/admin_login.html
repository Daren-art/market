<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в админку</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:#0f0f1a; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .box { background:#1a1a2e; border-radius:20px; padding:48px 40px; width:360px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        h2 { color:white; font-size:24px; text-align:center; margin-bottom:32px; }
        label { display:block; color:#aaa; font-size:13px; margin-bottom:6px; }
        input { width:100%; padding:12px 16px; background:#0f0f1a; border:2px solid #2a2a4a; border-radius:10px; color:white; font-size:15px; margin-bottom:16px; }
        input:focus { outline:none; border-color:#e94560; }
        button { width:100%; padding:13px; background:#e94560; color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
        button:hover { background:#c73652; }
        .err { background:rgba(233,69,96,0.15); color:#e94560; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; }
        .back { text-align:center; margin-top:16px; }
        .back a { color:#888; font-size:13px; text-decoration:none; }
        .back a:hover { color:#e94560; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 Панель администратора</h2>
        {% if error %}
        <div class="err">⚠️ {{ error }}</div>
        {% endif %}
        <form action="/admin/login" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label>Пароль администратора</label>
            <input type="password" name="password" placeholder="Введите пароль" required autofocus>
            <button type="submit">Войти в админку</button>
        </form>
        <div class="back"><a href="/">← На главную</a></div>
    </div>
</body>
</html>
