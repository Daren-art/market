<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Marketplace{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }
        nav {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
            height: 64px; box-shadow: 0 2px 16px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { color: #e94560; font-size: 22px; font-weight: 800; text-decoration: none; letter-spacing: 1px; }
        .nav-logo span { color: #fff; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a {
            color: #ccc; text-decoration: none; padding: 8px 14px;
            border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .nav-links a:hover { background: rgba(233,69,96,0.15); color: #e94560; }
        .cart-btn { background: #e94560 !important; color: white !important; display: flex; align-items: center; gap: 6px; }
        .cart-count { background: white; color: #e94560; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
        .nav-user { color: #aaa; font-size: 13px; padding: 8px 10px; }
        main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .page-title { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 28px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-img-placeholder { width: 100%; height: 200px; background: #f0f2f5; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .card-body { padding: 16px; }
        .card-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
        .card-desc { font-size: 13px; color: #666; margin-bottom: 12px; line-height: 1.5; }
        .card-price { font-size: 20px; font-weight: 800; color: #e94560; margin-bottom: 14px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; }
        .btn-secondary { background: #f0f2f5; color: #1a1a2e; }
        .btn-secondary:hover { background: #e0e3e9; }
        .btn-full { width: 100%; text-align: center; padding: 12px; }
        .form-box { background: white; border-radius: 20px; padding: 40px; max-width: 420px; margin: 60px auto; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
        .form-box h2 { font-size: 26px; font-weight: 800; margin-bottom: 28px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 2px solid #e8e8e8; font-size: 15px; transition: border 0.2s; background: #fafafa; }
        .form-group input:focus { outline: none; border-color: #e94560; background: white; }
        .form-link { text-align: center; margin-top: 18px; font-size: 14px; color: #888; }
        .form-link a { color: #e94560; text-decoration: none; font-weight: 600; }
        .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; }
        .alert-error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .badge-waiting { background: #fff3cd; color: #856404; }
        .badge-confirmed { background: #d4edda; color: #155724; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }
        .order-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .order-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .order-id { font-size: 18px; font-weight: 700; }
        .order-items { border-top: 1px solid #f0f2f5; padding-top: 16px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .order-total { display: flex; justify-content: flex-end; font-size: 16px; font-weight: 700; color: #e94560; margin-top: 12px; padding-top: 12px; border-top: 2px solid #f0f2f5; }
        .cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
        .cart-wrap { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
        .cart-item { display: flex; align-items: center; gap: 16px; padding: 16px; border-bottom: 1px solid #f0f2f5; }
        .cart-item:last-child { border-bottom: none; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 700; font-size: 16px; }
        .cart-item-price { color: #888; font-size: 14px; margin-top: 4px; }
        .cart-item-total { font-weight: 700; color: #e94560; font-size: 16px; }
        .summary-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); position: sticky; top: 80px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #666; }
        .summary-total { font-size: 20px; font-weight: 800; color: #e94560; border-top: 2px solid #f0f2f5; padding-top: 14px; margin-top: 14px; display: flex; justify-content: space-between; }
        .empty { text-align: center; padding: 80px 20px; color: #aaa; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty h3 { font-size: 20px; font-weight: 700; color: #555; margin-bottom: 8px; }
    </style>
</head>
<body>
<nav>
    <a class="nav-logo" href="/"><span>Market</span>Place</a>
    <div class="nav-links">
        <a href="/">🏠 Главная</a>
        {% if request.session.get("user_id") %}
            <a href="/orders">📋 Мои заказы</a>
            <a href="/cart" class="btn cart-btn">
                🛒 Корзина
                {% if cart_count is defined and cart_count > 0 %}
                    <span class="cart-count">{{ cart_count }}</span>
                {% endif %}
            </a>
            <span class="nav-user">👤 {{ request.session.get("username", "") }}</span>
            <a href="/logout" style="color:#ff6b6b;">Выйти</a>
        {% else %}
            <a href="/login">Войти</a>
            <a href="/register" style="background:#e94560;color:white;padding:8px 16px;border-radius:8px;">Регистрация</a>
        {% endif %}
    </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
